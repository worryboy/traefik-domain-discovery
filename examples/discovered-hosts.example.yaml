schema_version: 1
intent: discovery-review-only
hosts:
  - host: app.example.com
    seen_in_access_log: true
    sources:
      - type: docker_label
        container: web
        service: app
        project: homelab
      - type: file_provider
        service: app-service
        file: examples/config.example.yaml
  - host: traefik.example.com
    sources:
      - type: file_provider
        service: api@internal
        file: examples/config.example.yaml
  - host: www.app.example.com
    sources:
      - type: file_provider
        service: app-service
        file: examples/config.example.yaml
  - host: "{subdomain:[a-z0-9-]+}.preview.example.com"
    notes: HostRegexp requires review before use as a plain DNS target.
    sources:
      - type: file_provider
        service: preview-service
        file: examples/config.example.yaml
